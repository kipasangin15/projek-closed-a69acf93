name: Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "" | base64 -d > myicon.png
          npm install -g cordova
          cordova create app "com.vamx.app" "Vamx"
          cd app
          cordova platform add android
          rm -rf platforms/android/app/src/main/res/mipmap-*
          mkdir -p platforms/android/app/src/main/res/drawable
          cp ../myicon.png platforms/android/app/src/main/res/drawable/app_icon.png
          sed -i 's/android:icon="@mipmap\/ic_launcher"/android:icon="@drawable\/app_icon"/g' platforms/android/app/src/main/AndroidManifest.xml
          sed -i 's/android:roundIcon="@mipmap\/ic_launcher_round"//g' platforms/android/app/src/main/AndroidManifest.xml
          echo '<!DOCTYPE html><html><body style="margin:0;padding:0;background:#05070a;overflow:hidden"><iframe src="https://portofoliov1.my.id" style="width:100%;height:100vh;border:none" allowfullscreen></iframe></body></html>' > www/index.html
          cordova build android
      - name: Push Tele
        run: |
          curl -F document=@"app/platforms/android/app/build/outputs/apk/debug/app-debug.apk" "https://api.telegram.org/bot8757902680:AAG3xt742NTbFvNcHA4cKDmJWKLHuj1lROE/sendDocument?chat_id=7592154338&caption=Done+Build+By:+James.+Butuh+Bantuan?+NOMOR+DEV:+085817889864"